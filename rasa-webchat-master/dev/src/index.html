<head>
  <title>NYX - Chatbot</title>
  <script>
    const load = () => {
      if (!WebChat) setTimeout(load, 100);
      if (WebChat) WebChat.default({
        customData: { language: "en" },
        socketUrl: "http://localhost:5005",
        withRules: true,
      });
    }
    setTimeout(load, 200);
  </script>
</head>
