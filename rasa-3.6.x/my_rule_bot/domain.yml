version: "3.1"

intents:
  - greet
  - goodbye
  - check_balance
  - ask_faq
  - inform_account
  - atm_issues
  - faq_atm_transaction_fail
  - faq_atm_transaction_success
  - faq_bgl_details
  - provide_rrn

responses:

  utter_greet:
    - text: "Hello! I am your secure banking assistant. How can I help you today?"
      buttons:
        - title: "Check Balance"
          payload: "/check_balance"
        - title: "FAQs"
          payload: "/ask_faq"
        - title: "ATM Issues"
          payload: "/atm_issues"

  utter_main_menu:
    - text: "Is there anything else I can help you with?"
      buttons:
        - title: "Check Balance"
          payload: "/check_balance"
        - title: "ATM Issues"
          payload: "/atm_issues"
        - title: "FAQs"
          payload: "/ask_faq"

  utter_please_rephrase:
    - text: "Select an FAQ option:"
      buttons:
        - title: "ATM Transaction fails"
          payload: "/faq_atm_transaction_fail"
        - title: "ATM Transaction success"
          payload: "/faq_atm_transaction_success"
        - title: "BGL details"
          payload: "/faq_bgl_details"

  utter_ask_rrn:
    - text: "Please enter your RRN number."

  utter_goodbye:
    - text: "Goodbye! Have a secure day."

  utter_ask_account:
    - text: "Please enter your account number."

  utter_atm_issues:
    - text: "I can help with ATM issues. Give me transaction serial number..."

actions:
  - action_fetch_balance
  - action_atm_issue
  - action_atm_fail
  - action_atm_success
  - action_bgl_fetch

slots:
  bgl_no:
    type: text
    mappings:
      - type: from_text
  
  rrn_number:
    type: text
    mappings:
      - type: from_text

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true